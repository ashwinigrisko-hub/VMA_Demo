<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisiQuate IVM — Intelligent Vendor Management · Live Prototype</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#1B2A4A; --orange:#E86B1A; --orange-d:#C4560F; --orange-l:#FDEEE3;
    --midblue:#2E5E9B; --purple:#5B21B6; --pink:#BE185D; --ml:#059669;
    --bg:#f0f2f5; --panel:#ffffff; --surface3:#f8fafc; --ink:#1a1a1a; --muted:#6b7280; --muted2:#9ca3af; --line:#e2e4e8;
    --brand:#E86B1A; --brand-d:#C4560F; --brand-l:#FDEEE3;
    --green:#059669; --amber:#D97706; --red:#DC2626; --blue:#2E5E9B; --violet:#5B21B6;
    --shadow:0 1px 2px rgba(27,42,74,.06),0 4px 12px rgba(27,42,74,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"system-ui","Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
  /* Top brand bar (navy) */
  .topbrand{background:var(--navy);color:#fff;display:flex;align-items:center;gap:10px;padding:12px 22px;position:sticky;top:0;z-index:40}
  .topbrand .dot0{width:9px;height:9px;border-radius:50%;background:var(--orange);flex-shrink:0}
  .topbrand .logo{font-weight:800;font-size:15.5px;letter-spacing:.3px;color:#fff}
  .topbrand .logo span{color:var(--orange)}
  .badge{font-size:9.5px;font-weight:800;letter-spacing:.6px;background:var(--orange);color:#fff;padding:3px 8px;border-radius:4px;margin-left:6px}
  .badge.syn{background:#2c3f63;color:#c8d4e8}
  .topbrand .meta{margin-left:auto;font-size:11px;color:#9fb0cc;text-align:right}
  .app{display:flex;min-height:calc(100vh - 45px)}
  /* Sidebar (white) */
  .sidebar{width:248px;background:var(--panel);border-right:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:45px;height:calc(100vh - 45px);overflow-y:auto}
  .nav-role{padding:15px 16px 6px;font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted2);font-weight:800}
  .nav a{display:flex;align-items:center;gap:9px;padding:9px 16px;color:#374151;text-decoration:none;font-size:13px;border-left:3px solid transparent;cursor:pointer}
  .nav a:hover{background:var(--surface3)}
  .nav a.active{background:var(--orange-l);color:var(--orange-d);border-left-color:var(--orange);font-weight:600}
  .nav a .ico{width:16px;text-align:center;color:var(--muted2)}
  .nav a.active .ico{color:var(--orange)}
  .nav a .ml{margin-left:auto;font-size:8.5px;font-weight:800;background:#e6f6ef;color:var(--ml);padding:2px 5px;border-radius:3px}
  .foot{margin-top:auto;padding:14px 16px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted2)}
  /* Main */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:11px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:45px;z-index:20}
  .roles{display:flex;gap:6px}
  .roles button{border:1px solid transparent;background:transparent;padding:6px 12px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px}
  .roles button:hover{background:var(--surface3)}
  .roles button.active{background:#fff;color:var(--navy);border-color:var(--line);box-shadow:var(--shadow)}
  .roles button .dot{width:9px;height:9px;border-radius:50%}
  .filters{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
  select{font-size:12px;padding:6px 26px 6px 10px;border:1px solid var(--line);border-radius:7px;background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7280'/></svg>") no-repeat right 9px center;color:var(--ink);cursor:pointer;-webkit-appearance:none;appearance:none}
  .content{padding:22px 24px 60px;max-width:1280px;width:100%}
  .page-head{margin-bottom:18px}
  .page-head h1{font-size:21px;font-weight:750;letter-spacing:-.2px}
  .page-head .role-tag{font-size:10.5px;font-weight:800;letter-spacing:.6px;color:var(--navy);text-transform:uppercase}
  .page-head p{color:var(--muted);margin-top:5px;max-width:820px;font-size:13px}
  /* KPI tiles */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .lbl{font-size:11.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:5px}
  .kpi .val{font-size:26px;font-weight:750;margin-top:7px;letter-spacing:-.5px}
  .kpi .delta{font-size:11.5px;margin-top:4px;font-weight:600}
  .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
  .kpi .sub{font-size:10.5px;color:var(--muted);margin-top:2px}
  .tag{font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:4px;vertical-align:middle}
  .tag.av{background:#e6f6ef;color:#059669} .tag.src{background:#f1f5f9;color:#475569}
  .i{display:inline-block;margin-left:4px;width:14px;height:14px;line-height:14px;text-align:center;font-size:9.5px;font-weight:800;font-style:normal;text-transform:none;letter-spacing:0;color:#fff;background:var(--muted2);border-radius:50%;cursor:pointer;vertical-align:middle}
  .i:hover{background:var(--brand)}
  th .i{background:#aab2bf} th .i:hover{background:var(--brand)}
  /* Info popover */
  .pop-back{position:fixed;inset:0;z-index:99}
  .pop{position:fixed;z-index:100;width:372px;max-width:92vw;max-height:82vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 48px rgba(15,23,42,.26)}
  .pop-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff}
  .pop-h span{font-weight:750;font-size:14.5px;color:var(--navy)}
  .pop-h .x{border:0;background:transparent;font-size:21px;line-height:1;color:var(--muted2);cursor:pointer;padding:0 2px}
  .pop-h .x:hover{color:var(--ink)}
  .pop-b{padding:4px 16px 16px}
  .pop-b .pl{color:var(--brand);font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-top:13px}
  .pop-b p{font-size:12px;color:#374151;margin-top:3px;line-height:1.5}
  .pop-b .dctx{margin-top:14px;border-top:1px dashed var(--line);padding-top:9px}
  .pop-b .dctx p{color:var(--muted);font-size:11px}
  /* cards / grid */
  .grid{display:grid;gap:16px}
  .g2{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:2fr 1fr}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .card h3{font-size:13.5px;font-weight:700;padding:14px 16px 4px}
  .card .desc{font-size:11.5px;color:var(--muted);padding:0 16px 12px}
  .card .body{padding:0 16px 16px}
  .card.full{margin-bottom:16px}
  canvas{max-height:290px}
  /* tables */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700;padding:9px 12px;border-bottom:1px solid var(--line);background:#f8fafc;position:sticky;top:0}
  td{padding:9px 12px;border-bottom:1px solid var(--line)}
  tr:last-child td{border-bottom:0}
  tbody tr:hover{background:#f8fafc}
  .num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
  .p-green{background:#F0FDF4;color:#047857} .p-amber{background:#FFFBEB;color:#B45309}
  .p-red{background:#FEF2F2;color:#B91C1C} .p-blue{background:#EFF6FF;color:#2E5E9B}
  .p-gray{background:#f1f5f9;color:#475569} .p-violet{background:#F3EEFB;color:#5B21B6}
  .bar{height:7px;background:#eef2f6;border-radius:20px;overflow:hidden;min-width:70px}
  .bar>i{display:block;height:100%;border-radius:20px}
  .money{font-weight:700}
  .flag{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
  /* alert list */
  .alert{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);align-items:flex-start}
  .alert:last-child{border-bottom:0}
  .alert .sev{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
  .alert .a-body{flex:1}
  .alert .a-title{font-weight:650;font-size:13px}
  .alert .a-meta{font-size:11px;color:var(--muted);margin-top:3px}
  .alert .a-act{font-size:11.5px;color:var(--brand-d);margin-top:5px;font-weight:600}
  .alert .a-val{font-weight:750;font-size:14px;white-space:nowrap}
  /* timeline */
  .tl{position:relative;padding-left:22px}
  .tl:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
  .tl .ev{position:relative;padding:0 0 16px 0}
  .tl .ev:before{content:"";position:absolute;left:-19px;top:3px;width:11px;height:11px;border-radius:50%;background:#fff;border:2px solid var(--brand)}
  .tl .ev.den:before{border-color:var(--red)} .tl .ev.pay:before{border-color:var(--green)}
  .tl .ev.stall:before{border-color:var(--amber)}
  .tl .ev .d{font-size:10.5px;color:var(--muted)}
  .tl .ev .t{font-size:12.5px;font-weight:600;margin-top:1px}
  .tl .ev .x{font-size:11.5px;color:var(--muted)}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .note{background:#f8fafc;border:1px solid var(--line);border-left:3px solid var(--brand);border-radius:8px;padding:12px 14px;font-size:12px}
  .banner{background:var(--orange-l);border:1px solid #f6cba7;border-radius:10px;padding:11px 15px;font-size:12.5px;color:#8a3d0f;margin-bottom:16px;display:flex;gap:9px;align-items:center}
  .legend{font-size:11px;color:var(--muted);padding:10px 16px;background:#f8fafc;border-top:1px solid var(--line);display:flex;gap:16px;flex-wrap:wrap}
  .legend span{display:flex;align-items:center;gap:5px}
  h4.sec{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:22px 0 10px;font-weight:700}
  @media(max-width:1000px){.g2,.g3,.split{grid-template-columns:1fr}}
</style>
</head>
<body>
<header class="topbrand">
  <span class="dot0"></span>
  <div class="logo">Visi<span>Quate</span> IVM — Intelligent Vendor Management</div>
  <span class="badge">LIVE PROTOTYPE</span><span class="badge syn">SYNTHETIC DATA</span>
  <div class="meta">Demo Health System · Data as of Jul 17, 2026 · nightly ETL 6:00 AM CST · Draft v1.0 · Ashwini Grisko</div>
</header>
<div class="app">
  <aside class="sidebar">
    <nav class="nav" id="nav"></nav>
    <div class="foot">
      Intelligent Vendor Management<br>Backend analytics · code-first build
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="roles" id="roles"></div>
      <div class="filters">
        <select id="f-range"><option>Last 30 days</option><option>MTD</option><option>QTD</option><option>Last 90 days</option><option>Rolling 12 mo</option></select>
        <select id="f-fac"><option>All facilities</option><option>Main Campus</option><option>North Clinic</option><option>Surgical Center</option></select>
        <select id="f-vendor"><option>All vendors</option><option>Meridian Recovery</option><option>Coastal AR Partners</option><option>Summit Collections</option><option>Apex Receivables</option></select>
        <select id="f-fc"><option>All financial classes</option><option>Commercial</option><option>Medicare</option><option>Medicaid</option><option>Self-Pay</option></select>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
/* ---------------- Config: roles, pages ---------------- */
const ROLES = {
  exec:{name:"Executive / VP", dot:"#5B21B6", pages:["exec-summary"]},
  director:{name:"Director", dot:"#2E5E9B", pages:["vendor-scorecard","placement-strategy","alerts"]},
  manager:{name:"Manager", dot:"#1B2A4A", pages:["invoice-validation","inventory-recon"]},
  analyst:{name:"Analyst", dot:"#BE185D", pages:["account-deep-dive"]}
};
const PAGES = {
  "exec-summary":{t:"Executive Summary", ico:"◆", ml:false},
  "vendor-scorecard":{t:"Vendor Scorecard", ico:"▤", ml:true},
  "placement-strategy":{t:"Placement Strategy", ico:"◇", ml:true},
  "alerts":{t:"Alert Command Center", ico:"⚑", ml:false},
  "invoice-validation":{t:"Invoice Validation", ico:"✓", ml:false},
  "inventory-recon":{t:"Inventory Reconciliation", ico:"⇄", ml:false},
  "account-deep-dive":{t:"Account Deep Dive", ico:"⊙", ml:true}
};

/* ---------------- Synthetic data ---------------- */
const fmt$ = n => (n<0?"-":"")+"$"+Math.abs(n).toLocaleString();
const fmtK = n => "$"+(n/1000).toFixed(0)+"K";
const fmtM = n => "$"+(n/1e6).toFixed(2)+"M";
const pct = n => n.toFixed(1)+"%";

const VENDORS = [
  {id:"MER", name:"Meridian Recovery",  fee:"18% contingency",  placed:24800000, recovery:41.2, yield:96.4, ctc:6.1, netYield:35.1, cash:2380000, invRate:97.8, invMatch:94.2, leak:38400, grade:"Strong on complex denials", anomaly:"none"},
  {id:"CST", name:"Coastal AR Partners",fee:"22% contingency",  placed:18100000, recovery:34.6, yield:88.1, ctc:8.4, netYield:26.2, cash:1410000, invRate:82.3, invMatch:86.7, leak:214600,grade:"Weak on low-balance follow-up", anomaly:"high"},
  {id:"SUM", name:"Summit Collections", fee:"Hybrid (flat+12%)",placed:12600000, recovery:38.9, yield:92.7, ctc:5.4, netYield:33.5, cash:1090000, invRate:95.1, invMatch:91.4, leak:61200, grade:"Balanced mid-balance commercial", anomaly:"amber"},
  {id:"APX", name:"Apex Receivables",   fee:"15% contingency",  placed:9400000,  recovery:29.7, yield:79.4, ctc:9.9, netYield:19.8, cash:604000,  invRate:74.6, invMatch:79.1, leak:142900,grade:"High cost, aging low-liquidity", anomaly:"high"}
];
const TOT = {
  placed: VENDORS.reduce((a,v)=>a+v.placed,0),
  cash: VENDORS.reduce((a,v)=>a+v.cash,0),
  leak: VENDORS.reduce((a,v)=>a+v.leak,0),
  invRate: 88.7, invMatch: 89.4
};
const BUCKETS = [ // A/R Valuator bond-rating style liquidity
  {g:"AAA", label:"Highest liquidity", bal:3100000, held:"12% external", flag:"retain"},
  {g:"AA",  label:"High liquidity",    bal:5400000, held:"31% external", flag:"retain"},
  {g:"A",   label:"Good liquidity",    bal:9800000, held:"58% external", flag:"ok"},
  {g:"BBB", label:"Moderate",          bal:14200000,held:"79% external", flag:"ok"},
  {g:"BB",  label:"Low liquidity",     bal:19600000,held:"88% external", flag:"ok"},
  {g:"B",   label:"Lowest liquidity",  bal:12800000,held:"91% external", flag:"ok"}
];
// vendor performance within each A/R Valuator bucket (recovery %)
const BUCKET_PERF = {
  MER:{AAA:52,AA:49,A:44,BBB:40,BB:34,B:26},
  CST:{AAA:47,AA:42,A:37,BBB:33,BB:28,B:19},
  SUM:{AAA:50,AA:45,A:41,BBB:37,BB:31,B:23},
  APX:{AAA:44,AA:39,A:33,BBB:29,BB:23,B:15}
};
const ALERTS = [
  {sev:"red",   type:"Payment without activity", vendor:"Coastal AR Partners", n:47, val:214600, owner:"A. Grisko (Analyst)", due:"Jul 21", act:"Dispute fees — contract requires vendor activity before fee is allowed", ev:"47 invoice lines billed on accounts with no logged vendor touch this cycle"},
  {sev:"red",   type:"Inventory mismatch", vendor:"Apex Receivables", n:132, val:820000, owner:"J. Reyes (Manager)", due:"Jul 23", act:"Recall / reassign — accounts closed-but-active with vendor", ev:"132 accounts paid or closed internally still active in Apex inventory file"},
  {sev:"amber", type:"Vendor recovery below expected", vendor:"Apex Receivables", n:0, val:0, owner:"S. Ortega (Director)", due:"Jul 28", act:"Escalate for QBR — recovery 29.7% vs 36% expected for bucket mix", ev:"Recovery rate 6.3 pts below normalized expectation for assigned inventory"},
  {sev:"red",   type:"Highly liquid account placed externally", vendor:"Coastal AR Partners", n:18, val:412000, owner:"S. Ortega (Director)", due:"Jul 22", act:"Retain internally — AAA/AA liquidity should not be outsourced", ev:"18 AAA/AA-graded accounts ($412K) sitting with vendor at 22% contingency"},
  {sev:"amber", type:"Payment yield drop", vendor:"Coastal AR Partners", n:0, val:0, owner:"J. Reyes (Manager)", due:"Jul 25", act:"Investigate — yield down 4.2 pts vs 90-day baseline", ev:"Payment yield vs expected fell from 92.3% to 88.1% over trailing 30 days"},
  {sev:"amber", type:"Duplicate placement", vendor:"Summit Collections", n:9, val:74000, owner:"A. Grisko (Analyst)", due:"Jul 24", act:"Resolve duplicate — accounts placed with two vendors simultaneously", ev:"9 accounts appear in both Summit and Meridian inventory files"},
  {sev:"amber", type:"Contract SLA breach — no first touch", vendor:"Apex Receivables", n:63, val:290000, owner:"J. Reyes (Manager)", due:"Jul 26", act:"SLA breach notice — first touch beyond 5-day contract window", ev:"63 newly placed accounts with no first touch within contractual SLA"},
  {sev:"blue",  type:"Contract renewal window", vendor:"Meridian Recovery", n:0, val:0, owner:"S. Ortega (Director)", due:"Aug 15", act:"Review terms — 90-day termination-notice window opens Aug 15", ev:"Meridian contract auto-renews Nov 13 unless notice given by Aug 15"}
];
const INV_EXCEPTIONS = [
  {acct:"HS-4471902", vendor:"Coastal AR Partners", billed:1840, actual:1840, cls:"Payment without activity", note:"Fee billed, no vendor touch logged", fix:"dispute"},
  {acct:"HS-4468110", vendor:"Apex Receivables",    billed:920,  actual:610,  cls:"Overbill vs collection", note:"Contingency applied to gross, not net collection", fix:"dispute"},
  {acct:"HS-4472244", vendor:"Coastal AR Partners", billed:2760, actual:0,    cls:"Billed on recalled account", note:"Account recalled Jun 28, fee dated Jul 3", fix:"dispute"},
  {acct:"HS-4459087", vendor:"Summit Collections",  billed:1450, actual:1450, cls:"Rate mismatch", note:"Billed 14% vs 12% contract hybrid rate", fix:"escalate"},
  {acct:"HS-4470331", vendor:"Apex Receivables",    billed:640,  actual:640,  cls:"Validated", note:"Matches collection + contract rate", fix:"ok"},
  {acct:"HS-4461925", vendor:"Meridian Recovery",   billed:3120, actual:3120, cls:"Validated", note:"Matches collection + contract rate", fix:"ok"},
  {acct:"HS-4473558", vendor:"Coastal AR Partners", billed:1990, actual:1310, cls:"Overbill vs collection", note:"Fee exceeds actual posted payment", fix:"dispute"},
  {acct:"HS-4457743", vendor:"Summit Collections",  billed:880,  actual:880,  cls:"Validated", note:"Matches collection + contract rate", fix:"ok"}
];
const MISMATCH = [
  {cls:"Closed-but-active", n:132, val:820000, vendor:"Apex Receivables", act:"Recall from vendor"},
  {cls:"Missing from vendor file", n:74, val:388000, vendor:"Coastal AR Partners", act:"Confirm placement / re-send"},
  {cls:"Unassigned (in file, not placed)", n:41, val:196000, vendor:"Coastal AR Partners", act:"Investigate assignment"},
  {cls:"Duplicate placement", n:9, val:74000, vendor:"Summit / Meridian", act:"Resolve duplicate"},
  {cls:"Recalled-but-worked", n:12, val:63000, vendor:"Apex Receivables", act:"Dispute fees + confirm recall"}
];
const TIMELINE = [
  {type:"", d:"Mar 12, 2026", t:"Account placed with Coastal AR Partners", x:"Balance at placement $4,820 · Commercial · A/R Valuator grade AA"},
  {type:"", d:"Mar 18, 2026", t:"Vendor first touch logged", x:"Within 5-day SLA · outbound payer call"},
  {type:"den", d:"Apr 02, 2026", t:"Denial received — CO-197 (auth)", x:"Payer: Regional Commercial · $4,820 at risk"},
  {type:"pay", d:"Apr 29, 2026", t:"Partial payment posted — $1,310", x:"Attribution: account with vendor at time of payment ✓"},
  {type:"stall",d:"May 27, 2026", t:"No vendor activity for 28 days", x:"Stall flag — balance $3,510 remaining"},
  {type:"den", d:"Jun 04, 2026", t:"Vendor invoice line billed — $1,990", x:"⚠ Fee exceeds actual collection ($1,310) — flagged for dispute"},
  {type:"", d:"Jun 28, 2026", t:"Account recalled to internal team", x:"A/R Valuator AA — should have been retained internally"}
];

/* ---------------- State ---------------- */
let state = {role:"exec", page:"exec-summary"};
let charts = [];
function clearCharts(){ charts.forEach(c=>c.destroy()); charts=[]; }

/* ---------------- Render shell ---------------- */
function renderRoles(){
  const r = document.getElementById("roles");
  r.innerHTML = Object.entries(ROLES).map(([k,v])=>
    `<button data-role="${k}" class="${k===state.role?'active':''}"><span class="dot" style="background:${v.dot}"></span>${v.name}</button>`).join("");
  r.querySelectorAll("button").forEach(b=>b.onclick=()=>{state.role=b.dataset.role;state.page=ROLES[state.role].pages[0];render();});
}
function renderNav(){
  const n = document.getElementById("nav");
  n.innerHTML = Object.entries(ROLES).map(([rk,rv])=>{
    const links = rv.pages.map(pk=>{
      const p=PAGES[pk];
      return `<a data-page="${pk}" class="${pk===state.page?'active':''}"><span class="ico">${p.ico}</span>${p.t}${p.ml?'<span class="ml">ML</span>':''}</a>`;
    }).join("");
    return `<div class="nav-role">${rv.name}</div>${links}`;
  }).join("");
  n.querySelectorAll("a").forEach(a=>a.onclick=()=>{
    state.page=a.dataset.page;
    for(const [rk,rv] of Object.entries(ROLES)){ if(rv.pages.includes(state.page)){state.role=rk;break;} }
    render();
  });

function head(role, title, desc){

function kpi(lbl,val,delta,cls,sub,tag){
  return `<div class="kpi"><div class="lbl">${lbl}${tag?` <span class="tag ${tag[0]}">${tag[1]}</span>`:''}</div><div class="val">${val}</div>`+

  "Active alerts":{def:"Open exception alerts currently firing across the vendor portfolio from the prebuilt alert library.",calc:"Count of alerts in open status (not yet resolved or suppressed).",purpose:"The daily worklist of vendor-management exceptions needing an owner and action.",interpret:"Severity mix matters more than count; a few high-severity items outweigh many informational ones.",guidance:"Clear high-severity first; track resolution rate to confirm the program acts on what it surfaces.",data:"Alert engine across all feeds. "+DEMO},
  "$ at risk / flagged":{def:"Total dollar exposure represented by the accounts across all open alerts.",calc:"Sum of impacted-account balances (or flagged fee dollars) across open alerts.",purpose:"Prioritizes attention by money at stake rather than alert count.",interpret:"A few high-dollar alerts can dominate; sort the alert list by value.",guidance:"Escalate the largest-exposure alerts to a named owner with a due date.",data:"Alerts joined to A/R and invoices. "+DEMO},
  "High-severity due ≤7d":{def:"High-severity alerts whose recommended action is due within the next seven days.",calc:"Count of open alerts with severity High and a due date within 7 days.",purpose:"Focuses the team on time-sensitive, high-impact items (disputes, recalls, SLA breaches).",interpret:"A growing number signals the team is falling behind on the most important work.",guidance:"Staff to keep this near zero; overflow is a capacity or process signal.",data:"Alert engine. "+DEMO},
  "Resolved this period":{def:"Alerts closed during the period, with the share closed inside the service-level window.",calc:"Count of alerts moved to resolved; SLA % = resolved-within-SLA divided by resolved.",purpose:"Shows the program is not just surfacing exceptions but acting on and closing them.",interpret:"High volume with low SLA % means items resolve late; low volume may mean a backlog.",guidance:"Track both together; a healthy program shows steady closes at high SLA compliance.",data:"Alert outcome tracking (Phase 2). "+DEMO},
  "Lines auto-validated":{def:"Vendor invoice line items that passed automated validation this cycle, out of the total lines received.",calc:"Auto-validated line count divided by total line count for the cycle.",purpose:"The raw workload automation behind the invoice validation rate.",interpret:"The remainder is the exception queue analysts must review.",guidance:"If the manual remainder is large for one vendor, pursue invoice-format normalization.",data:"Invoice audit engine. "+DEMO},
  "Open exceptions":{def:"Invoice lines that failed automated validation and await analyst review (approve, dispute, or escalate).",calc:"Count and dollar sum of lines with an open exception validation result.",purpose:"The actionable dispute pipeline where fee leakage is recovered.",interpret:"Dollar value matters more than count; a few high-dollar overbills are the priority.",guidance:"Work exceptions by value and evidence strength; document outcomes for the dispute record.",data:"Invoice audit exceptions. "+DEMO},
  "Accounts reconciled":{def:"Total accounts compared this cycle across the paired vendor and client inventory files.",calc:"Count of accounts present in either file and evaluated by the reconciliation.",purpose:"The denominator behind inventory match rate and mismatch counts.",interpret:"Should track the size of the outsourced book; a sudden drop hints at a missing or late file.",guidance:"Confirm both files arrived at matched cadence before trusting the match rate.",data:"Vendor + client inventory files. "+DEMO},
  "Mismatches flagged":{def:"Accounts that did not reconcile, classified as missing, unassigned, closed-but-active, duplicate, or recalled-but-worked.",calc:"Count of accounts with a non-matched reconciliation result, each with a recommended action.",purpose:"Surfaces operational cleanup and invoice-dispute opportunities.",interpret:"Closed-but-active and payment-without-activity classes usually carry the most dollar exposure.",guidance:"Route each class to its recommended action (recall, reassign, dispute) and track to closure.",data:"Inventory reconciliation. "+DEMO},
  "Duplicate placements":{def:"Accounts appearing in more than one vendor's inventory at the same time.",calc:"Count of accounts found in two or more vendor inventory files after cross-vendor de-duplication.",purpose:"Prevents paying two vendors for the same account and double-working inventory.",interpret:"Any non-zero value is worth resolving; dollars can be small but the fee risk is real.",guidance:"Confirm the true holder, recall from the other, and dispute any overlapping fees.",data:"Cross-vendor inventory match. "+DEMO},
  "Account":{def:"The account currently in focus, with its financial class and facility.",calc:"Identifier drawn from the client A/R system.",purpose:"Anchors the deep-dive to a single claim's full vendor lifecycle.",data:"Client A/R (Epic), PHI-governed. "+DEMO},
  "Balance":{def:"Current open balance on the account versus its balance at placement.",calc:"Current balance now vs. balance at placement from the placement file.",purpose:"Shows how much has been collected and how much remains at risk.",interpret:"A large gap between placement and current balance indicates progress; little movement signals a stall.",data:"Client A/R + placement file. "+DEMO},
  "A/R Valuator grade":{def:"Bond-rating-style liquidity grade (AAA to B) assigned per account by the A/R Valuator (Apex) engine.",calc:"Weighted liquidity score from balance, age, payer, and denial signals, bucketed into letter grades; runs nightly in ETL.",purpose:"Drives placement strategy — what to keep in-house vs. outsource — and normalizes vendor comparison.",interpret:"AAA/AA are highly collectible and usually should be retained; B/BB are hard inventory better suited to specialist vendors.",guidance:"Flag high-grade balance sitting with vendors for retention; route low-grade inventory to the vendor that works it best.",data:"A/R Valuator (Apex), Etyon. Some accounts may show no grade (engineering item). "+DEMO},
  "Attribution":{def:"Which vendor (or internal team) an account and its payments are credited to.",calc:"Derived per client from Epic work queues, billing indicator, agency assignment, or algorithmic transaction-matching.",purpose:"The foundation for fair vendor comparison, payment splits, and invoice validation.",interpret:"Attribution reliability is the biggest cross-client variable; low confidence undermines every downstream metric.",guidance:"Validate attribution fields during onboarding; treat unattributed payments as a data-quality alert.",data:"Client A/R + configured attribution logic. "+DEMO},
  "Fee structure":{def:"The contracted fee model the vendor bills under.",calc:"From the contract database: contingency %, flat, finder fee, or hybrid.",interpret:"The fee model determines which validation checks apply (activity-required flags apply to contingency, not flat).",data:"Contract database. "+DEMO},
  "Recovery %":{def:"Share of placed balance the vendor has collected over a rolling window.",calc:"Cash recovered divided by balance at placement.",interpret:"Compare on the normalized (complexity-adjusted) basis, not raw — a vendor holding hard inventory shows a lower raw rate.",guidance:"Rates below the vendor's normalized expectation warrant a QBR conversation.",data:"Placement + A/R postings. "+DEMO},
  "Yield vs exp.":{def:"Actual payment relative to the payment expected for the vendor's inventory mix.",calc:"Actual payment divided by expected payment (expected derived from payer, balance, age, and grade mix).",interpret:"Above 100% is out-performing the mix; a sustained drop vs. baseline triggers a yield-drop alert.",data:"Performance model. "+DEMO},
  "Cost to collect":{def:"What it costs to collect through this vendor, as a share of dollars recovered.",calc:"Vendor fees divided by cash recovered.",interpret:"Lower is better; read alongside recovery — a high recovery rate can still be a poor deal if cost to collect is high.",data:"Invoices + A/R. Open question: computed by IVM vs. sourced from client (Gate 6). "+DEMO},
  "Net yield":{def:"Recovery rate net of the cost to collect.",calc:"Recovery % minus cost-to-collect %.",interpret:"The bottom-line economics per vendor and the primary basis for ranking vendors fairly.",data:"Performance model. "+DEMO},
  "Cash (12mo)":{def:"Cash recoveries attributed to the vendor over the trailing twelve months.",calc:"Sum of attributed payments over the rolling 12-month window.",interpret:"Absolute contribution; pair with net yield so volume is not mistaken for efficiency.",data:"A/R postings + attribution. "+DEMO},
  "Strength / weakness":{def:"The account types a vendor performs well or poorly on.",calc:"Derived from performance-by-bucket analysis across payer, balance, age, and liquidity grade.",interpret:"Guides which inventory to route to which vendor rather than treating vendors as interchangeable.",data:"Vendor strategy scorecard. "+DEMO},
  "Signal":{def:"Whether the vendor is performing on, near, or below its normalized expectation.",calc:"Compares actual recovery/yield to the expectation for the vendor's inventory mix; thresholds set the on-track / watch / below status.",interpret:"'Below expected' is the trigger to investigate or escalate, independent of the raw rate.",data:"Normalized comparison model. "+DEMO},
  "Liquidity":{def:"How collectible the accounts in a grade are.",calc:"Descriptive label for the A/R Valuator grade band.",interpret:"Higher liquidity means easier to collect internally, so less reason to pay a contingency fee.",data:"A/R Valuator (Apex). "+DEMO},
  "% held externally":{def:"Share of a liquidity grade's balance currently placed with vendors rather than retained in-house.",calc:"Externally-placed balance in the grade divided by total balance in the grade.",interpret:"A high external share of high-liquidity grades is the classic over-outsourcing pattern to correct.",data:"Placement files + A/R Valuator. "+DEMO},
  "Strategy signal":{def:"The recommended posture for a liquidity grade — retain internally or outsource.",calc:"Rule on grade plus external share (e.g., AAA/AA flagged retain).",interpret:"'Retain internally' on a high-grade row is a direct instruction to pull that balance back.",data:"Placement strategy logic. "+DEMO},
  "Billed":{def:"The fee amount the vendor billed on this invoice line.",calc:"Billed amount from the vendor invoice.",interpret:"Compared against actual collection times contract rate; a gap is a leakage flag.",data:"Vendor invoice. "+DEMO},
  "Actual coll.":{def:"The actual posted collection attributable to the vendor for this account.",calc:"Attributed payment from client A/R for the account and period.",interpret:"The truth the invoice is audited against; billed above this is an overbill.",data:"Client A/R + attribution. "+DEMO},
  "Classification":{def:"The validation or reconciliation outcome assigned to the row.",calc:"Rules over collection, placement/recall, activity, and contract rate (invoice) or file comparison (inventory).",interpret:"Any row that is not Validated or Matched is an actionable exception.",data:"Audit / reconciliation engine. "+DEMO},
  "Evidence":{def:"The supporting detail behind the row's result.",calc:"Assembled from the transactions, placement, and contract records that drove the flag.",interpret:"This is what backs a dispute; stronger evidence means a more winnable dispute.",data:"Multiple feeds. "+DEMO},
  "Action":{def:"The recommended disposition for the line.",calc:"Derived from the classification (auto-validated, escalate, or dispute).",interpret:"Drives the analyst worklist; disputes carry the recoverable dollars.",data:"Audit engine. "+DEMO},
  "$ Exposure":{def:"Dollar value at risk for the mismatch classification.",calc:"Sum of balances of the accounts in that mismatch class.",interpret:"Rank cleanup work by exposure, not account count.",data:"Reconciliation + A/R. "+DEMO},
  "Accounts":{def:"Count of accounts in the classification.",calc:"Number of accounts assigned to the row's category.",interpret:"Read with exposure — many low-dollar accounts may matter less than a few high-dollar ones.",data:"Reconciliation. "+DEMO},
  "Recommended action":{def:"The suggested resolution for the accounts in the row.",calc:"Mapped from the mismatch or exception type (recall, reassign, dispute, investigate).",interpret:"Each action has an owner and is tracked to closure.",data:"Reconciliation / alert logic. "+DEMO},
  "$ Impact":{def:"Estimated dollar impact of the risk on program value.",calc:"Exposure or recoverable dollars tied to the risk driver.",interpret:"Ranks the executive risk list by money at stake.",data:"Multiple feeds. "+DEMO},
  "Recommended intervention":{def:"The suggested action to address the risk.",calc:"Mapped from the risk type to a play (dispute, recall, retain, escalate).",interpret:"Turns the risk list into an action plan with clear next steps.",data:"Alert / strategy logic. "+DEMO},
  "Vendor":{def:"The collection vendor associated with the row.",calc:"From the placement and attribution data.",data:"Placement files. "+DEMO}
};
function applyTips(){
  const content = document.getElementById("content");
  content.querySelectorAll(".kpi .lbl").forEach(lbl=>{
    const key = (lbl.firstChild ? lbl.firstChild.textContent : lbl.textContent).trim();
    if(INFO[key] && !lbl.querySelector(".i")) lbl.insertAdjacentHTML("beforeend",' <span class="i" data-key="'+key.replace(/"/g,"&quot;")+'">i</span>');
  });
  content.querySelectorAll("th").forEach(th=>{
    const key = th.textContent.trim();
    if(INFO[key] && !th.querySelector(".i")) th.insertAdjacentHTML("beforeend",' <span class="i" data-key="'+key.replace(/"/g,"&quot;")+'">i</span>');
  });
}
function secRow(l,v){ return v ? '<div class="pl">'+l+'</div><p>'+v+'</p>' : ''; }
function openInfo(key, iconEl){
  closeInfo();
  const o = INFO[key]; if(!o) return;
  const back = document.createElement("div"); back.className="pop-back"; back.onclick=closeInfo;
  const body = secRow("Definition",o.def)+secRow("Calculation",o.calc)+secRow("Purpose",o.purpose)+
    secRow("How to interpret",o.interpret)+secRow("Decision guidance",o.guidance)+
    (o.data ? '<div class="dctx"><div class="pl">Data context</div><p>'+o.data+'</p></div>' : '');
  const pop = document.createElement("div"); pop.className="pop";
  pop.innerHTML = '<div class="pop-h"><span>'+key+'</span><button class="x" aria-label="Close">&times;</button></div><div class="pop-b">'+body+'</div>';
  document.body.appendChild(back); document.body.appendChild(pop);
  pop.querySelector(".x").onclick=closeInfo;
  const r = iconEl.getBoundingClientRect(), pw = pop.offsetWidth, ph = pop.offsetHeight;
  let left = r.left-4, top = r.bottom+8;
  if(left+pw > window.innerWidth-12) left = window.innerWidth-pw-12;
  if(left < 12) left = 12;
  if(top+ph > window.innerHeight-12) top = Math.max(12, r.top-ph-8);
  pop.style.left = left+"px"; pop.style.top = top+"px";
}
function closeInfo(){ document.querySelectorAll(".pop,.pop-back").forEach(e=>e.remove()); }
document.addEventListener("click", e=>{ const i = e.target.closest(".i"); if(i && i.dataset.key){ e.stopPropagation(); openInfo(i.dataset.key, i); } });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeInfo(); });
function render(){
  clearCharts();
  renderRoles(); renderNav();
  const r = RENDER[state.page];
  document.getElementById("content").innerHTML = r.html();
  applyTips();
  if(r.draw) setTimeout(r.draw,10);
  window.scrollTo(0,0);
}
render();
</script>
